<!DOCTYPE html>
<html>
<head>
    <title>{{ serie.nom }}</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 40px; }
        .ep-list { max-width: 800px; margin: auto; text-align: left; }
        .episode { background: #222; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; }
        a { color: white; text-decoration: none; background: #e50914; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <a href="/" style="background: none;">⬅ Retour</a>
    <h1>{{ serie.nom }}</h1>
    <img src="{{ serie.img }}" width="200">

    <div class="ep-list">
        {% for ep in serie.episodes %}
        <div class="episode">
            <span><strong>{{ ep.saison }}</strong> - {{ ep.titre_ep }}</span>
            <a href="{{ ep.lien_ep }}" target="_blank">▶ Lire</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
