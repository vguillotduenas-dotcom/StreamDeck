<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{{ serie.nom }} - StreamDeck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at center, #300000 0%, #000000 100%); color: white; min-height: 100vh; }
        .list-group-item { background: #111; border: 1px solid #ff0000; color: white; margin-bottom: 10px; border-radius: 5px !important; }
        .btn-danger { background: #ff0000; border: none; }
    </style>
</head>
<body>
    <div class="container mt-5 text-center">
        <h1 class="text-danger fw-bold">{{ serie.nom }}</h1>
        <img src="{{ serie.img }}" style="width: 200px; border-radius: 10px; border: 2px solid #ff0000;" class="mb-4">
        
        <div class="text-start mx-auto" style="max-width: 600px;">
            <h3 class="mb-3">Épisodes :</h3>
            <div class="list-group">
                {% for ep in serie.episodes %}
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <span><strong>{{ ep.saison }}</strong> : {{ ep.titre_ep }}</span>
                    <a href="{{ ep.lien_ep }}" class="btn btn-sm btn-danger" target="_blank">Lire</a>
                </div>
                {% endfor %}
            </div>
        </div>
        <a href="/" class="btn btn-outline-danger mt-4">Retour à l'accueil</a>
    </div>
</body>
</html>
