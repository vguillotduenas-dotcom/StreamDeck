<!DOCTYPE html>
<html>
<head>
    <title>Episodes</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 40px; }
        .ep-list { max-width: 800px; margin: auto; }
        .ep-card { background: #181818; padding: 20px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #e50914; }
        .play-btn { background: #e50914; color: white; text-decoration: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; }
        .back { color: #555; text-decoration: none; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="ep-list">
        <a href="/" class="back">← Retour</a>
        <h1>{{ serie.nom }}</h1>
        {% for ep in serie.episodes %}
        <div class="ep-card">
            <div><strong>{{ ep.saison }}</strong> - {{ ep.titre_ep }}</div>
            <a href="{{ ep.lien_ep }}" target="_blank" class="play-btn">LIRE</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
