<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>StreamDeck - Films & Séries</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #2c0b0b 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .navbar {
            background-color: rgba(0, 0, 0, 0.9) !important;
            border-bottom: 1px solid #ff0000;
        }
        .navbar-brand, .nav-link {
            color: #ff0000 !important;
        }
        .card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }
        .card:hover {
            transform: scale(1.05);
            border-color: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }
        .card-img-top {
            height: 350px;
            object-fit: cover;
        }
        .card-title {
            color: white;
        }
        .btn-outline-danger {
            color: #ff0000;
            border-color: #ff0000;
        }
        .btn-outline-danger:hover {
            background-color: #ff0000;
            color: white;
        }
        .form-control {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid #444;
        }
        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">StreamDeck</a>
            <form class="d-flex" method="GET">
                <input class="form-control me-2" type="search" name="q" placeholder="Rechercher..." aria-label="Search">
                <button class="btn btn-outline-danger" type="submit">OK</button>
            </form>
            {% if current_user.role == 'admin' %}
                <a href="/admin" class="btn btn-danger ms-2">Admin</a>
            {% endif %}
        </div>
    </nav>

    <div class="container mt-4">
        <div class="mb-4 text-center">
            <a href="/" class="btn btn-outline-danger me-2">Tous</a>
            <a href="/?genre=Action" class="btn btn-outline-danger me-2">Action</a>
            <a href="/?genre=Comédie" class="btn btn-outline-danger me-2">Comédie</a>
            <a href="/?genre=Drame" class="btn btn-outline-danger me-2">Drame</a>
        </div>

        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
            {% for f in films %}
            <div class="col">
                <div class="card h-100">
                    <img src="{{ f.img }}" class="card-img-top" alt="{{ f.nom }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ f.nom }}</h5>
                        <p class="card-text text-muted">{{ f.genre }}</p>
                        {% if f.type == 'film' %}
                            <a href="{{ f.lien }}" class="btn btn-danger w-100" target="_blank">Regarder</a>
                        {% else %}
                            <a href="/serie/{{ f.id }}" class="btn btn-danger w-100">Voir les épisodes</a>
                        {% endif %}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
