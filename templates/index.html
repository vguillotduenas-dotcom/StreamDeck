<!DOCTYPE html>
<html>
<head>
    <title>StreamDeck - Accueil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background:#141414; color:white; font-family:sans-serif; padding:20px; margin:0; }
        .header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
        .discord-btn { background:#5865F2; color:white; padding:12px 20px; border-radius:8px; text-decoration:none; font-weight:bold; font-size:14px; }
        .search-bar { width:100%; padding:15px; border-radius:25px; border:none; background:#333; color:white; font-size:16px; margin-bottom:30px; }
        .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:20px; }
        .card { background:#222; border-radius:10px; overflow:hidden; text-decoration:none; color:white; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width:100%; aspect-ratio: 2/3; object-fit:cover; }
        .card-info { padding:10px; text-align:center; }
        .admin-link { display:inline-block; margin-top:40px; color:#555; text-decoration:none; font-size:12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>StreamDeck</h1>
        <a href="https://discord.gg/D49fX5afus" target="_blank" class="discord-btn">💬 Demander un film</a>
    </div>

    <form action="/">
        <input type="text" name="search" class="search-bar" placeholder="Rechercher un film ou une série...">
    </form>

    <div class="grid">
        {% for item in items %}
        <a href="{{ item.video_url }}" class="card">
            <img src="{{ item.poster_url }}" alt="Affiche">
            <div class="card-info">
                <strong>{{ item.title }}</strong><br>
                <small style="color:#aaa;">{{ item.category }} {% if item.season %}S{{item.season}}{% endif %}</small>
            </div>
        </a>
        {% endfor %}
    </div>

    {% if current_user.is_admin %}
    <center><a href="/admin" class="admin-link">ACCÈS ADMINISTRATEUR</a></center>
    {% endif %}
</body>
</html>
