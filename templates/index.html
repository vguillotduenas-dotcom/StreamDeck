<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamDeck - Accueil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background: radial-gradient(circle at center, #300000 0%, #000000 100%); 
            color: white; 
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar { background: rgba(0,0,0,0.9); border-bottom: 2px solid #ff0000; }
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid #444; 
            transition: 0.3s; 
            overflow: hidden;
        }
        .card:hover { 
            border-color: #ff0000; 
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }
        .btn-danger { background-color: #ff0000; border: none; font-weight: bold; }
        .btn-discord { background: #5865F2; color: white; border: none; font-weight: bold; }
        .search-bar { background: #111; border: 1px solid #444; color: white; }
        .search-bar:focus { background: #222; color: white; border-color: #ff0000; box-shadow: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold fs-3" href="/">STREAMDECK</a>
            
            <form class="d-flex mx-auto w-50" action="/" method="GET">
                <input class="form-control me-2 search-bar" type="search" name="q" placeholder="Rechercher...">
                <button class="btn btn-outline-danger" type="submit"><i class="fas fa-search"></i></button>
            </form>

            <div class="d-flex gap-2">
                <a href="https://discord.gg/yGwPtXKEu" target="_blank" class="btn btn-discord">
                    <i class="fab fa-discord"></i> Discord
                </a>
                {% if current_user.role == 'admin' %}
                <a href="/admin" class="btn btn-warning"><i class="fas fa-user-shield"></i> Admin</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-uppercase fw-bold mb-4 border-start border-danger border-4 ps-3">Catalogue</h2>
        
        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4">
            {% for f in films %}
            <div class="col">
                <div class="card h-100">
                    <img src="{{ f.img }}" class="card-img-top" style="height: 250px; object-fit: cover;" alt="{{ f.nom }}">
                    <div class="card-body p-2 text-center">
                        <h6 class="card-title text-truncate mb-2">{{ f.nom }}</h6>
                        {% if f.type == 'film' %}
                            <a href="{{ f.lien }}" class="btn btn-sm btn-danger w-100" target="_blank">Regarder</a>
                        {% else %}
                            <a href="/serie/{{ f.id }}" class="btn btn-sm btn-danger w-100">Épisodes</a>
                        {% endif %}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        {% if not films %}
        <div class="text-center mt-5">
            <p class="text-muted fs-4">Aucun résultat trouvé...</p>
            <a href="/" class="btn btn-outline-danger">Voir tout le catalogue</a>
        </div>
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
