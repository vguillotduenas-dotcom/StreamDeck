<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamDeck - Accueil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* TON DESIGN NOIR ET ROUGE */
        body { 
            background: radial-gradient(circle at center, #300000 0%, #000000 100%); 
            color: #fff; 
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar { background: rgba(0,0,0,0.9); border-bottom: 2px solid #ff0000; }
        .btn-danger { background-color: #ff0000; border: none; font-weight: bold; text-transform: uppercase; }
        .btn-danger:hover { background-color: #cc0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        .btn-outline-danger { color: #ff0000; border-color: #ff0000; }
        .btn-discord { background: #5865F2; color: white; border: none; font-weight: bold; }
        .btn-discord:hover { background: #4752C4; }
        
        /* STYLE DES AFFICHES */
        .card { 
            background: rgba(0, 0, 0, 0.8); 
            border: 1px solid #ff0000; 
            border-radius: 10px; 
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
            transition: transform 0.3s;
        }
        .card:hover { 
            transform: scale(1.05); 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); 
            z-index: 2;
        }
        .card-img-top { 
            border-top-left-radius: 10px; 
            border-top-right-radius: 10px; 
            height: 350px; 
            object-fit: cover; 
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 p-3">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <a class="navbar-brand text-danger fw-bold fs-3" href="/">STREAMDECK</a>
            
            <form class="d-flex mx-auto my-2 my-lg-0 w-50" action="/" method="GET">
                <input class="form-control me-2 bg-dark text-white border-secondary" type="search" name="q" placeholder="Rechercher un film, une série...">
                <button class="btn btn-outline-danger" type="submit"><i class="fas fa-search"></i></button>
            </form>

            <div class="d-flex gap-2">
                <a href="TON_LIEN_DISCORD" class="btn btn-discord" target="_blank"><i class="fab fa-discord"></i> Discord</a>
                {% if current_user.is_authenticated and current_user.role == 'admin' %}
                    <a href="/admin" class="btn btn-danger"><i class="fas fa-cog"></i> Admin</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-4">
            {% for f in films %}
            <div class="col">
                <div class="card h-100 text-center">
                    <img src="{{ f.img }}" class="card-img-top" alt="{{ f.nom }}">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-bold text-white mb-3">{{ f.nom }}</h5>
                        <div class="mt-auto">
                            {% if f.type == 'film' %}
                                <a href="{{ f.lien }}" class="btn btn-danger w-100" target="_blank"><i class="fas fa-play me-2"></i>Regarder</a>
                            {% else %}
                                <a href="/serie/{{ f.id }}" class="btn btn-danger w-100"><i class="fas fa-list me-2"></i>Épisodes</a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12 text-center mt-5">
                <h3 class="text-muted"><i class="fas fa-ghost mb-3 fs-1 text-danger"></i><br>Aucun contenu trouvé.</h3>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
