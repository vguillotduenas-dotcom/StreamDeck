<!DOCTYPE html>
<html lang="fr">
<body style="background:#111; color:white; font-family:sans-serif; padding:20px;">
    <h1>🎬 STREAMDECK</h1>
    <div style="display:flex; flex-wrap:wrap; gap:15px;">
        {% for f in films %}
        <div style="width:150px; background:#222; padding:10px; border-radius:5px;">
            <a href="{{ f.lien }}" target="_blank" style="color:white; text-decoration:none;">
                <img src="{{ f.img }}" style="width:100%; border-radius:5px;">
                <p>{{ f.nom }}</p>
            </a>
        </div>
        {% endfor %}
    </div>
    <br><a href="/admin" style="color:gray; font-size:10px;">Admin</a>
</body>
</html>
