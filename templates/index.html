<!DOCTYPE html>
<html>
<head>
    <title>Streamdeck - Accueil</title>
    <style>
        body { background: #141414; color: white; font-family: Arial; text-align: center; padding: 20px; }
        .discord-box { background: #2c2f33; padding: 15px; border-radius: 10px; border: 2px solid #7289da; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #222; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        img { width: 100%; border-radius: 5px; height: 280px; object-fit: cover; }
        a { color: #7289da; text-decoration: none; font-weight: bold; }
        .btn-play { display: block; background: #e50914; color: white; padding: 10px; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🎬 STREAMDECK</h1>

    <div class="discord-box">
        <p>Pour une demande de film :</p>
        <a href="https://discord.gg/yGwPtXKEu" target="_blank">🔗 REJOINS LE DISCORD</a>
    </div>

    <div class="grid">
        {% for f in films %}
        <div class="card">
            <img src="{{ f.img }}">
            <h3>{{ f.nom }}</h3>
            <a href="{{ f.lien }}" target="_blank" class="btn-play">▶ Regarder</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
