<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamdeck</title>
    <style>
        body { background: #141414; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 4%; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, rgba(0,0,0,0)); position: fixed; width: 92%; z-index: 100; }
        .logo { color: #e50914; font-size: 25px; font-weight: bold; text-decoration: none; }
        .discord-link { background: #7289da; color: white; padding: 8px 15px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 12px; }
        
        .main-content { padding-top: 100px; text-align: center; }
        .search-area { margin-bottom: 30px; }
        .search-bar { padding: 12px 20px; width: 300px; border-radius: 25px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; outline: none; }
        .genre-box { padding: 10px; border-radius: 5px; background: #333; color: white; border: none; margin-right: 10px; }

        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding: 0 4%; }
        .movie-card { background: #181818; border-radius: 4px; overflow: hidden; transition: transform 0.3s; position: relative; text-decoration: none; color: white; }
        .movie-card:hover { transform: scale(1.05); z-index: 10; }
        .movie-card img { width: 100%; height: 300px; object-fit: cover; }
        .movie-info { padding: 10px; text-align: left; }
        .movie-title { font-size: 14px; font-weight: bold; margin: 0; }
        .type-tag { position: absolute; top: 10px; left: 10px; background: rgba(229, 9, 20, 0.8); padding: 2px 8px; border-radius: 2px; font-size: 10px; font-weight: bold; }
        
        .admin-btn { position: fixed; bottom: 20px; right: 20px; color: #444; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="/" class="logo">STREAMDECK</a>
        <a href="https://discord.gg/yGwPtXKEu" class="discord-link" target="_blank">DEMANDE DE FILM : DISCORD</a>
    </div>

    <div class="main-content">
        <form class="search-area" action="/">
            <select name="genre" class="genre-box" onchange="this.form.submit()">
                <option value="">Tous les Genres</option>
                <option value="Horreur" {% if request.args.get('genre') == 'Horreur' %}selected{% endif %}>Horreur</option>
                <option value="Humour" {% if request.args.get('genre') == 'Humour' %}selected{% endif %}>Humour</option>
                <option value="Famille" {% if request.args.get('genre') == 'Famille' %}selected{% endif %}>Famille</option>
            </select>
            <input type="text" name="q" class="search-bar" placeholder="Rechercher un film..." value="{{ request.args.get('q', '') }}">
        </form>

        <div class="movie-grid">
            {% for f in films %}
            <a href="{% if f.type == 'film' %}{{ f.lien }}{% else %}/serie/{{ f.id }}{% endif %}" class="movie-card">
                <span class="type-tag">{{ f.type.upper() }}</span>
                <img src="{{ f.img }}" alt="{{ f.nom }}">
                <div class="movie-info">
                    <p class="movie-title">{{ f.nom }}</p>
                    <p style="font-size: 11px; color: #888; margin: 5px 0 0 0;">{{ f.genre }}</p>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>

    {% if current_user.role == 'admin' %}
    <a href="/admin" class="admin-btn">PANNEAU ADMIN</a>
    {% endif %}

</body>
</html>
