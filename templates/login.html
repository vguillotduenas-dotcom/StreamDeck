<!DOCTYPE html>
<html>
<head>
    <title>Streamdeck - Connexion</title>
    <style>
        body { background: #000; color: white; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: rgba(20,20,20,0.9); padding: 40px; border-radius: 10px; width: 350px; text-align: center; border: 1px solid #333; }
        h1 { color: #e50914; font-size: 30px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: none; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #e50914; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .admin-link { margin-top: 25px; display: block; color: #444; text-decoration: none; font-size: 12px; cursor: pointer; }
        #admin-form { display: none; margin-top: 15px; border-top: 1px solid #222; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>STREAMDECK</h1>
        <form method="POST">
            <input type="text" name="nom" placeholder="Ton Nom" required>
            <input type="text" name="prenom" placeholder="Ton Prénom" required>
            <input type="text" name="code" placeholder="Code d'accès unique" required>
            <button type="submit" class="btn">ACCÉDER AU CATALOGUE</button>
        </form>
        <span class="admin-link" onclick="document.getElementById('admin-form').style.display='block'">Accès Administrateur</span>
        <div id="admin-form">
            <form method="POST">
                <input type="password" name="code" placeholder="Mots de passe Admin">
                <button type="submit" style="background:#222; color:#888; border:none; padding:5px; cursor:pointer; width:100%;">Valider</button>
            </form>
        </div>
    </div>
</body>
</html>
