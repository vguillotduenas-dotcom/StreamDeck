<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamdeck - Connexion</title>
    <style>
        body { background: #000; color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(0, 0, 0, 0.75); padding: 60px; border-radius: 8px; width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        h1 { color: #e50914; font-size: 35px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #333; border: none; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 15px; background: #e50914; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 16px; margin-top: 10px; }
        .admin-link { margin-top: 40px; display: block; color: #555; text-decoration: none; font-size: 12px; cursor: pointer; }
        #admin-form { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>STREAMDECK</h1>
        <form method="POST">
            <input type="text" name="nom" placeholder="Ton Nom" required>
            <input type="text" name="prenom" placeholder="Ton Prénom" required>
            <input type="text" name="code" placeholder="Code d'accès" required>
            <button type="submit" class="btn-red">SE CONNECTER</button>
        </form>

        <span class="admin-link" onclick="document.getElementById('admin-form').style.display='block'">Accès Privé</span>
        <div id="admin-form">
            <form method="POST">
                <input type="password" name="code" placeholder="Mot de passe Admin">
                <button type="submit" style="background:#222; color:#888; border:none; padding:5px; width:100%; cursor:pointer;">Entrer</button>
            </form>
        </div>
    </div>
</body>
