<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>StreamDeck - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #2c0b0b 0%, #000000 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #ff0000;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            width: 100%;
            max-width: 400px;
        }
        .btn-danger {
            background-color: #ff0000;
            border: none;
        }
        .btn-danger:hover {
            background-color: #cc0000;
        }
        .form-control {
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid #444;
        }
        .form-control:focus {
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h1 class="mb-4" style="color: #ff0000; text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);">StreamDeck</h1>
        <form method="POST">
            <input type="text" name="code" class="form-control mb-3" placeholder="Ton code d'accès" required>
            <div id="userInfo" style="display:none;">
                <input type="text" name="nom" class="form-control mb-3" placeholder="Nom">
                <input type="text" name="prenom" class="form-control mb-3" placeholder="Prénom">
            </div>
            <button type="submit" class="btn btn-danger w-100">C'est parti !</button>
        </form>
    </div>
    <script>
        const codeInput = document.querySelector('input[name="code"]');
        codeInput.addEventListener('input', function() {
            if (this.value.length === 8 && this.value !== 'ADMIN123') {
                document.getElementById('userInfo').style.display = 'block';
            } else {
                document.getElementById('userInfo').style.display = 'none';
            }
        });
    </script>
</body>
</html>
