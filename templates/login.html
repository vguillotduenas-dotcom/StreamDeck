<!DOCTYPE html>
<html>
<head>
    <title>Connexion</title>
    <style>
        body { background: #141414; color: white; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; }
        form { background: #222; padding: 30px; border-radius: 10px; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #e50914; color: white; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <form method="POST">
        <h2>Accès Privé</h2>
        <input type="text" name="nom" placeholder="Ton Nom" required>
        <input type="text" name="prenom" placeholder="Ton Prénom" required>
        <input type="text" name="code" placeholder="Code d'accès unique" required>
        <button type="submit">Entrer</button>
    </form>
</body>
