<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamDeck - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            background: radial-gradient(circle at center, #300000 0%, #000000 100%); 
            color: #fff; 
            min-height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
        }
        .navbar { background: rgba(0,0,0,0.9); border-bottom: 2px solid #ff0000; }
        .admin-box { 
            background: rgba(0, 0, 0, 0.85); 
            border: 1px solid #ff0000; 
            border-radius: 15px; 
            padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.15); 
        }
        h4 { color: #ff0000; text-transform: uppercase; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; }
        h4 i { margin-right: 10px; }
        
        /* Formulaires */
        .form-control, .form-select { 
            background: #111 !important; 
            border: 1px solid #444 !important; 
            color: white !important; 
            margin-bottom: 12px; 
        }
        .form-control:focus { border-color: #ff0000 !important; box-shadow: 0 0 8px rgba(255, 0, 0, 0.4) !important; }
        
        .btn-danger { background-color: #ff0000; border: none; font-weight: bold; transition: 0.3s; }
        .btn-danger:hover { background-color: #b30000; transform: scale(1.02); }
        
        /* Tableaux et listes */
        .table { color: white; border-color: #444; }
        .list-container { max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .content-item { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid #333; 
            border-radius: 10px; 
            padding: 15px; 
            margin-bottom: 15px; 
        }
        .ep-adder { background: rgba(255, 0, 0, 0.05); border: 1px dashed #ff0000; border-radius: 8px; padding: 10px; margin-top: 10px; }
        
        /* Scrollbar stylisée */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold fs-3" href="/">STREAMDECK <span class="text-white fs-6">ADMIN</span></a>
            <a href="/" class="btn btn-outline-light btn-sm"><i class="fas fa-eye me-1"></i> Voir le site</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            
            <div class="col-lg-5">
                
                <div class="admin-box">
                    <h4><i class="fas fa-plus-circle"></i> Nouveau Contenu</h4>
                    <form method="POST">
                        <input type="hidden" name="add_content" value="1">
                        
                        <label class="small text-muted">Titre du film ou de la série</label>
                        <input type="text" name="nom" class="form-control" placeholder="Ex: Batman" required>
                        
                        <label class="small text-muted">URL de l'affiche (Image)</label>
                        <input type="text" name="img" class="form-control" placeholder="https://..." required>
                        
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="small text-muted">Genre</label>
                                <select name="genre" class="form-select">
                                    <option>Action</option><option>Horreur</option><option>Anime</option><option>Série</option><option>SF</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="small text-muted">Format</label>
                                <select name="type" id="typeSelect" class="form-select">
                                    <option value="film">Film Unique</option>
                                    <option value="serie">Série TV</option>
                                </select>
                            </div>
                        </div>

                        <div id="sectionFilm">
                            <label class="small text-muted">Lien du lecteur (Embed/Vidéo)</label>
                            <input type="text" name="lien_film" class="form-control" placeholder="https://swish.com/...">
                        </div>

                        <div id="sectionSerie" style="display:none;" class="p-3 border border-danger rounded mb-3">
                            <p class="small text-danger fw-bold mb-2">Détails du premier épisode :</p>
                            <input type="text" name="saison" class="form-control form-control-sm" placeholder="Saison 1">
                            <input type="text" name="titre_ep" class="form-control form-control-sm" placeholder="Nom de l'épisode">
                            <input type="text" name="lien_ep" class="form-control form-control-sm" placeholder="Lien Vidéo">
                        </div>

                        <button type="submit" class="btn btn-danger w-100">PUBLIER LE CONTENU</button>
                    </form>
                </div>

                <div class="admin-box">
                    <h4><i class="fas fa-key"></i> Accès Utilisateurs</h4>
                    <form method="POST" class="mb-4">
                        <input type="hidden" name="gen_code" value="1">
                        <button type="submit" class="btn btn-danger w-100">GÉNÉRER UN CODE UNIQUE</button>
                    </form>

                    <div class="list-container" style="max-height: 300px;">
                        <table class="table table
