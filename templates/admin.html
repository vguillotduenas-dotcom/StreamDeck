<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>STREAMDECK ADMIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        .box { background: #111; border: 1px solid #ff0000; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .form-control, .form-select { background: #222; border: 1px solid #444; color: #fff; margin-bottom: 10px; }
        .btn-danger { background: #ff0000; border: none; font-weight: bold; }
        .text-danger { color: #ff0000 !important; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-danger mb-4">PANNEAU ADMIN</h2>
        <div class="row">
            <div class="col-md-5">
                <div class="box">
                    <h4>Ajouter Contenu</h4>
                    <form method="POST">
                        <input type="text" name="nom" class="form-control" placeholder="Titre" required>
                        <input type="text" name="img" class="form-control" placeholder="Lien Image" required>
                        <select name="type" id="typeSelect" class="form-select">
                            <option value="film">Film</option>
                            <option value="serie">Série</option>
                        </select>
                        <select name="genre" class="form-select">
                            <option>Action</option><option>Horreur</option><option>Anime</option><option>Série</option>
                        </select>
                        <div id="sectionFilm"><input type="text" name="lien_film" class="form-control" placeholder="Lien Vidéo"></div>
                        <div id="sectionSerie" style="display:none;" class="p-2 border border-danger mb-2">
                            <input type="text" name="saison" class="form-control" placeholder="Saison 1">
                            <input type="text" name="titre_ep" class="form-control" placeholder="Titre Ep">
                            <input type="text" name="lien_ep" class="form-control" placeholder="Lien Ep">
                        </div>
                        <button type="submit" name="btn_add_content" class="btn btn-danger w-100">Enregistrer</button>
                    </form>
                </div>

                <div class="box">
                    <h4>Codes d'accès</h4>
                    <form method="POST">
                        <button type="submit" name="btn_gen_code" class="btn btn-danger w-100 mb-3">Générer Code</button>
                    </form>
                    <table class="table table-dark small">
                        {% for u in users %}
                        <tr>
                            <td>{{ u.code }}</td>
                            <td>{{ u.nom or 'Libre' }}</td>
                            <td><a href="/del_u/{{ u.id }}" class="text-danger">Suppr.</a></td>
                        </tr>
                        {% endfor %}
                    </table>
                </div>
            </div>

            <div class="col-md-7">
                <div class="box">
                    <h4>Catalogue</h4>
                    {% for f in films %}
                    <div class="border-bottom border-secondary mb-3 pb-3">
                        <div class="d-flex justify-content-between">
                            <span><strong>[{{ f.type|upper }}]</strong> {{ f.nom }}</span>
                            <a href="/del_v/{{ f.id }}" class="btn btn-sm btn-outline-danger">Supprimer</a>
                        </div>
                        {% if f.type == 'serie' %}
                        <form method="POST" class="mt-2 row g-1">
                            <input type="hidden" name="video_id" value="{{ f.id }}">
                            <div class="col-3"><input type="text" name="saison" class="form-control form-control-sm" placeholder="Sais."></div>
                            <div class="col-9"><input type="text" name="titre_ep" class="form-control form-control-sm" placeholder="Titre Ep"></div>
                            <div class="col-12"><input type="text" name="lien_ep" class="form-control form-control-sm" placeholder="Lien Ep"></div>
                            <button type="submit" name="btn_add_episode" class="btn btn-sm btn-danger w-100">Ajouter Episode</button>
                        </form>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('typeSelect').onchange = function() {
            document.getElementById('sectionSerie').style.display = (this.value === 'serie') ? 'block' : 'none';
            document.getElementById('sectionFilm').style.display = (this.value === 'film') ? 'block' : 'none';
        };
    </script>
</body>
</html>
