<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>StreamDeck - Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: radial-gradient(circle at center, #300000 0%, #000000 100%); color: #fff; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: rgba(0,0,0,0.9); border-bottom: 2px solid #ff0000; }
        .admin-box { background: rgba(0, 0, 0, 0.8); border: 1px solid #ff0000; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }
        .form-control, .form-select { background: #111 !important; border: 1px solid #444 !important; color: white !important; margin-bottom: 10px; }
        .form-control:focus { border-color: #ff0000 !important; box-shadow: 0 0 10px rgba(255, 0, 0, 0.5) !important; }
        .btn-danger { background-color: #ff0000; border: none; font-weight: bold; }
        .btn-danger:hover { background-color: #cc0000; }
        h4 { color: #ff0000; text-transform: uppercase; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #ff0000; padding-bottom: 10px; }
        .list-container { max-height: 600px; overflow-y: auto; padding-right: 5px; }
        .ep-form { background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 8px; border: 1px solid #333; }
    </style>
</head>
