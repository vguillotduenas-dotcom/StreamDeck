<div class="col-md-7">
    <div class="admin-box">
        <h4><i class="fas fa-film me-2"></i>Catalogue & Épisodes</h4>
        <div style="max-height: 700px; overflow-y: auto;">
            {% for f in films %}
            <div class="p-3 mb-3 border-bottom border-secondary">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-bold">{{ f.nom }} <span class="badge bg-secondary ms-2">{{ f.type }}</span></span>
                    <a href="/del_v/{{ f.id }}" class="text-danger" onclick="return confirm('Supprimer ce contenu ?')"><i class="fas fa-trash"></i></a>
                </div>

                {% if f.type == 'serie' %}
                <form method="POST" class="mt-3 p-2 bg-dark rounded border border-secondary shadow-sm">
                    <input type="hidden" name="add_episode" value="1">
                    <input type="hidden" name="video_id" value="{{ f.id }}">
                    
                    <div class="row g-2">
                        <div class="col-4">
                            <input type="text" name="saison" class="form-control form-control-sm" placeholder="Saison (ex: 1)" required>
                        </div>
                        <div class="col-8">
                            <input type="text" name="titre_ep" class="form-control form-control-sm" placeholder="Titre de l'épisode" required>
                        </div>
                        <div class="col-12 mt-1">
                            <input type="text" name="lien_ep" class="form-control form-control-sm" placeholder="Lien du lecteur (embed)" required>
                        </div>
                        <div class="col-12 mt-2">
                            <button type="submit" name="add_episode_btn" class="btn btn-sm btn-danger w-100">
                                <i class="fas fa-plus"></i> Ajouter cet épisode
                            </button>
                        </div>
                    </div>
                </form>

                <div class="mt-2 small text-muted">
                    {% if f.episodes %}
                        <i class="fas fa-list-ol me-1"></i> {{ f.episodes|length }} épisode(s) enregistré(s)
                    {% else %}
                        <i class="fas fa-exclamation-triangle me-1"></i> Aucun épisode
                    {% endif %}
                </div>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
</div>
