<!DOCTYPE html>
<html>
<head>
    <title>Admin - Streamdeck</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        input, select { padding: 10px; margin: 10px 0; width: 100%; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { background: #e50914; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        .serie-box { display: none; background: #fff5f5; padding: 10px; border: 1px dashed #e50914; border-radius: 5px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .del { color: red; text-decoration: none; font-size: 12px; border: 1px solid red; padding: 3px; border-radius: 3px; }
    </style>
</head>
<body>
    <div style="text-align:center;"><a href="/">⬅ Retour au site</a></div>

    <div class="card">
        <h2>🎥 Nouveau Contenu</h2>
        <form method="POST">
            <input type="hidden" name="add_content">
            <select name="type" id="typeSelect" onchange="showHide()">
                <option value="film">Film</option>
                <option value="serie">Série</option>
            </select>
            <input type="text" name="nom" placeholder="Nom du contenu" required>
            <input type="text" name="img" placeholder="Lien Image Affiche" required>
            <select name="genre">
                <option value="Humour">Humour</option>
                <option value="Horreur">Horreur</option>
                <option value="Famille">Famille</option>
            </select>
            
            <div id="filmDiv"><input type="text" name="lien_film" placeholder="Lien Video Drive"></div>
            
            <div id="serieDiv" class="serie-box">
                <p><strong>Premier épisode :</strong></p>
                <input type="text" name="saison" placeholder="Saison 1">
                <input type="text" name="titre_ep" placeholder="Episode 1">
                <input type="text" name="lien_ep" placeholder="Lien Video Episode">
            </div>
            <button type="submit" class="btn">ENREGISTRER</button>
        </form>
    </div>

    <div class="card">
        <h2>➕ Ajouter des épisodes</h2>
        <form method="POST">
            <input type="hidden" name="add_only_ep">
            <select name="video_id">
                {% for f in films if f.type == 'serie' %}<option value="{{ f.id }}">{{ f.nom }}</option>{% endfor %}
            </select>
            <input type="text" name="saison" placeholder="Saison (ex: Saison 1)" required>
            <input type="text" name="titre_ep" placeholder="Episode (ex: Episode 2)" required>
            <input type="text" name="lien_ep" placeholder="Lien Video Episode" required>
            <button type="submit" class="btn" style="background:#333">RAJOUTER L'ÉPISODE</button>
        </form>
    </div>

    <div class="card">
        <h2>📂 Catalogue</h2>
        <table>
            {% for f in films %}
            <tr><td>{{ f.nom }}</td><td style="text-align:right;"><a href="{{ url_for('del_v', id=f.id) }}" class="del">SUPPRIMER</a></td></tr>
            {% endfor %}
        </table>
    </div>

    <script>
        function showHide() {
            var t = document.getElementById('typeSelect').value;
            document.getElementById('serieDiv').style.display = (t === 'serie') ? 'block' : 'none';
            document.getElementById('filmDiv').style.display = (t === 'film') ? 'block' : 'none';
        }
    </script>
</body>
</html>
