<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>StreamDeck - Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: radial-gradient(circle at center, #300000 0%, #000000 100%); 
            color: #fff; 
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar { background: rgba(0,0,0,0.9); border-bottom: 2px solid #ff0000; }
        .admin-box { 
            background: rgba(0, 0, 0, 0.8); 
            border: 1px solid #ff0000; 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }
        .form-control, .form-select { 
            background: #111; 
            border: 1px solid #444; 
            color: white; 
        }
        .form-control:focus { 
            background: #222; 
            color: white; 
            border-color: #ff0000; 
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5); 
        }
        .btn-danger { background-color: #ff0000; border: none; font-weight: bold; text-transform: uppercase; }
        .btn-outline-danger { color: #ff0000; border-color: #ff0000; }
        .btn-discord { background: #5865F2; color: white; border: none; font-weight: bold; }
        h2, h4 { color: #ff0000; text-transform: uppercase; font-weight: bold; }
        .badge-serie { background-color: #ff0000; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand text-danger fw-bold" href="/">STREAMDECK ADMIN</a>
            <form class="d-flex mx-auto w-50" action="/" method="GET">
                <input class="form-control me-2" type="search" name="q" placeholder="Rechercher un film/série...">
                <button class="btn btn-outline-danger" type="submit"><i class="fas fa-search"></i></button>
            </form>
            <div class="d-flex gap-2">
                <a href="TON_LIEN_DISCORD" class="btn btn-discord"><i class="fab fa-discord"></i> Discord</a>
                <a href="/" class="btn btn-outline-danger">Retour Site</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-5">
                <div class="admin-box">
                    <h2><i class="fas fa-plus-circle me-2"></i>Ajouter Contenu</h2>
                    <form method="POST">
                        <input type="hidden" name="add_content" value="1">
                        <label class="small text-muted">Titre du contenu</label>
                        <input type="text" name="nom" class="form-control" placeholder="Ex: Inception" required>
                        
                        <label class="small text-muted">Lien de l'affiche (Image URL)</label>
                        <input type="text" name="img" class="form-control" placeholder="https://..." required>
                        
                        <div class="row">
                            <div class="col-6">
                                <label class="small text-muted">Genre</label>
                                <select name="genre" class="form-select">
                                    <option>Action</option><option>Horreur</option><option>Comédie</option><option>Série</option><option>Anime</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="small text-muted">Type</label>
                                <select name="type" id="typeSelect" class="form-select">
                                    <option value="film">Film</option>
                                    <option value="serie">Série</option>
                                </select>
                            </div>
                        </div>

                        <div id="sectionFilm" class="mt-2">
                            <label class="small text-muted">Lien de la vidéo (Lecteur)</label>
                            <input type="text" name="lien_film" class="form-control" placeholder="https://embed...">
                        </div>

                        <div id="sectionSerie" class="mt-2" style="display:none; border-left: 2px solid #ff0000; padding-left: 10px;">
                            <h6 class="text-danger small">Premier Épisode</h6>
                            <input type="text" name="saison" class="form-control form-control-sm" placeholder="Saison 1">
                            <input type="text" name="titre_ep" class="form-control form-control-sm" placeholder="Titre de l'épisode">
                            <input type="text" name="lien_ep" class="form-control form-control-sm" placeholder="Lien vidéo">
                        </div>

                        <button type="submit" class="btn btn-danger w-100 mt-3">Enregistrer le contenu</button>
                    </form>
                </div>

                <div class="admin-box">
                    <h2><i class="fas fa-key me-2"></i>Codes d'accès</h2>
                    <form method="POST">
                        <input type="hidden" name="gen_code" value="1">
                        <button type="submit" class="btn btn-danger w-100 mb-3">Générer un nouveau code</button>
                    </form>
                    <div style="max-height: 200px; overflow-y: auto;">
                        <table class="table table-dark table-hover small">
                            <thead><tr><th>Code</th><th>Statut</th><th>Action
