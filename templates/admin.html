<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>StreamDeck - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #2c0b0b 0%, #000000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .navbar {
            background-color: rgba(0, 0, 0, 0.9) !important;
            border-bottom: 1px solid #ff0000;
        }
        .navbar-brand {
            color: #ff0000 !important;
        }
        .admin-card {
            background-color: rgba(20, 20, 20, 0.8);
            border: 1px solid #ff0000;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }
        .form-control, .form-select {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid #444;
        }
        .form-control:focus, .form-select:focus {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }
        .btn-danger {
            background-color: #ff0000;
            border: none;
        }
        .btn-danger:hover {
            background-color: #cc0000;
        }
        table {
            color: white !important;
        }
        th {
            color: #ff0000 !important;
        }
        tr:hover {
            background-color: rgba(255, 0, 0, 0.1) !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">StreamDeck Admin</a>
            <a href="/" class="btn btn-outline-danger">Retour au site</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <div class="admin-card">
                    <h3 style="color: #ff0000;">Ajouter un Film ou une Série</h3>
                    <form method="POST">
                        <input type="hidden" name="add_content">
                        <input type="text" name="nom" class="form-control mb-2" placeholder="Nom de la vidéo" required>
                        <input type="text" name="img" class="form-control mb-2" placeholder="Lien de l'image (affiche)" required>
                        <select name="genre" class="form-select mb-2">
                            <option>Action</option><option>Comédie</option><option>Drame</option><option>Horreur</option>
                        </select>
                        <select name="type" id="typeSelect" class="form-select mb-2">
                            <option value="film">Film</option>
                            <option value="serie">Série</option>
                        </select>
                        <div id="filmForm">
                            <input type="text" name="lien_film" class="form-control mb-2" placeholder="Lien direct de la vidéo">
                        </div>
                        <div id="serieForm" style="display:none;">
                            <h5 class="mt-3" style="color: #ff0000;">Premier épisode</h5>
                            <input type="text" name="saison" class="form-control mb-2" placeholder="Saison (ex: Saison 1)">
                            <input type="text" name="titre_ep" class="form-control mb-2" placeholder="Titre de l'épisode">
                            <input type="text" name="lien_ep" class="form-control mb-2" placeholder="Lien de l'épisode">
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Ajouter</button>
                    </form>
                </div>
            </div>
            <div class="col-md-6">
                <div class="admin-card">
                    <h3 style="color: #ff0000;">Gestion des utilisateurs</h3>
                    <form method="POST">
                        <input type="hidden" name="gen_code">
                        <button type="submit" class="btn btn-danger w-100 mb-3">Générer un nouveau code</button>
                    </form>
                    <table class="table table-dark table-striped">
                        <thead><tr><th>Code</th><th>Nom</th><th>Prénom</th><th>Action</th></tr></thead>
                        <tbody>
                            {% for u in users %}
                            <tr>
                                <td>{{ u.code }}</td>
                                <td>{{ u.nom or '' }}</td>
                                <td>{{ u.prenom or '' }}</td>
                                <td><a href="/del_u/{{ u.id }}" class="btn btn-sm btn-outline-danger">X</a></td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('typeSelect').addEventListener('change', function() {
            if (this.value === 'film') {
                document.getElementById('filmForm').style.display = 'block';
                document.getElementById('serieForm').style.display = 'none';
            } else {
                document.getElementById('filmForm').style.display = 'none';
                document.getElementById('serieForm').style.display = 'block';
            }
        });
    </script>
</body>
</html>
